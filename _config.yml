baseurl: ''
url: 'https://thomasrichards.me'
permalink: pretty
title: 'Thomas Richards'

favicon: 'images/logo/bear-logo.png'

logo:
  mobile: "images/logo/bear-logo.png"
  mobile_height: "32px"
  mobile_width: "32px"
  desktop: "images/logo/bear-logo.png"
  desktop_height: "32px"
  desktop_width: "120px"
home: 
  limit_projects: 6
collections:
  projects:
    output: true
    sort_by: weight
  team:
    output: true
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "service"
  - scope:
      path: ""
      type: "team"
    values:
      layout: "team"
sass:
  style: compressed
plugins:
  - jekyll-environment-variables
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - LICENSE.md
  - LICENSE
  - README.md